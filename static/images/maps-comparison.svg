<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#fefce8" rx="16"/>
  <text x="400" y="50" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#854d0e">Google Maps in China = Wrong Location</text>
  <!-- Wrong -->
  <rect x="50" y="80" width="320" height="200" rx="12" fill="#fef2f2" stroke="#fca5a5"/>
  <text x="210" y="115" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="bold" fill="#991b1b">Google Maps</text>
  <text x="210" y="145" text-anchor="middle" font-family="system-ui,sans-serif" font-size="36">🗺️</text>
  <text x="210" y="180" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#991b1b">Offset by 500m</text>
  <text x="210" y="205" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#991b1b">Wrong directions</text>
  <text x="210" y="230" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#991b1b">No transit data</text>
  <text x="210" y="260" text-anchor="middle" font-family="system-ui,sans-serif" font-size="32">❌</text>
  <!-- Right -->
  <rect x="430" y="80" width="320" height="200" rx="12" fill="#f0fdf4" stroke="#86efac"/>
  <text x="590" y="115" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="bold" fill="#166534">Apple Maps / Amap</text>
  <text x="590" y="145" text-anchor="middle" font-family="system-ui,sans-serif" font-size="36">📍</text>
  <text x="590" y="180" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#166534">Pinpoint accurate</text>
  <text x="590" y="205" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#166534">Real-time transit</text>
  <text x="590" y="230" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#166534">English interface</text>
  <text x="590" y="260" text-anchor="middle" font-family="system-ui,sans-serif" font-size="32">✅</text>
  <text x="400" y="330" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" fill="#64748b">Don't land without a working map app.</text>
</svg>
