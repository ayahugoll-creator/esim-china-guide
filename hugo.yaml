baseURL: "https://esimchina.trade/"
locale: "en-us"
title: "eSIM China Guide — Honest Reviews for Foreign Travelers"
theme: "PaperMod"

params:
  author: "eSIM China Guide"
  description: "Independent, honest eSIM reviews for travelers visiting China. Which eSIM actually works behind the Great Firewall? We test them all."
  ShowReadingTime: true
  ShowShareButtons: true
  ShowBreadCrumbs: true
  ShowPostNavLinks: true
  defaultTheme: auto
  disableThemeToggle: false
  ShowToc: true
  ShowCodeCopyButtons: true
  assets:
    favicon: "/favicon.ico"
    favicon16x16: "/favicon-16x16.png"
    favicon32x32: "/favicon-32x32.png"
  label:
    text: "📱 eSIM China Guide"
    icon: ""
    iconHeight: 0

  keywords:
    - "eSIM China"
    - "China eSIM"
    - "best eSIM for China"
    - "Airalo China"
    - "Holafly China"
    - "Great Firewall bypass"

menu:
  main:
    - name: "Best eSIMs"
      url: "/posts/best-esim-for-china-travel/"
      weight: 1
    - name: "Trip Planner"
      url: "/planner/"
      weight: 2
    - name: "Reviews"
      url: "/tags/reviews/"
      weight: 3
    - name: "Guides"
      url: "/tags/guides/"
      weight: 4
    - name: "About"
      url: "/about/"
      weight: 5

markup:
  goldmark:
    renderer:
      unsafe: true

outputs:
  home:
    - HTML
    - RSS
    - JSON
